<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background with slight red tint -->
  <rect width="32" height="32" rx="8" fill="#0a0608"/>
  <!-- Outer orbital ellipse -->
  <ellipse cx="16" cy="16" rx="12" ry="6" stroke="#ef1d32" stroke-width="1.2" stroke-opacity="0.5" transform="rotate(-35 16 16)"/>
  <!-- Inner orbital ellipse -->
  <ellipse cx="16" cy="16" rx="7.5" ry="3.5" stroke="#ef1d32" stroke-width="1" stroke-opacity="0.75" transform="rotate(40 16 16)"/>
  <!-- Core glow -->
  <circle cx="16" cy="16" r="3.5" fill="#ef1d32" opacity="0.95"/>
  <circle cx="16" cy="16" r="2" fill="#ff8fa0" opacity="0.9"/>
  <!-- Star sparkles -->
  <circle cx="8"  cy="9"  r="1"   fill="#ef1d32" opacity="0.7"/>
  <circle cx="23" cy="21" r="0.8" fill="#ef1d32" opacity="0.6"/>
  <circle cx="22" cy="8"  r="0.7" fill="#ef1d32" opacity="0.5"/>
  <circle cx="9"  cy="22" r="0.7" fill="#ef1d32" opacity="0.5"/>
</svg>
